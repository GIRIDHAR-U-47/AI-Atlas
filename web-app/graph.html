<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Atlas | Interaction Constellation</title>
    <link rel="stylesheet" href="graph.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex-display-md.min.js"></script>
</head>

<body>
    <div id="atlas-canvas">
        <div id="grid-bg"></div>
        <div id="graph-stage">
            <svg id="edge-layer" width="10000" height="10000" style="position:absolute; pointer-events:none;"></svg>
            <div id="nodes-layer"></div>
        </div>
    </div>

    <div class="interface-layer">
        <header class="top-bar">
            <div class="branding">
                <h1 style="font-family:'Space Grotesk'; font-size:1.2rem; font-weight:300; letter-spacing:0.5em;">AI
                    ATLAS <span style="font-size:0.6rem; opacity:0.4;">KNOWLEDGE GRAPH</span></h1>
                <div class="meta" id="system-log" style="font-size: 0.7rem; opacity: 0.4; font-family: monospace;">
                    [ READY_FOR_TRAVERSAL ]
                </div>
            </div>
            <input type="text" class="search-field" placeholder="LOCATE RESEARCH NODE...">
        </header>
    </div>

    <!-- Slide-out Reader -->
    <div class="side-reader" id="reader">
        <div class="close-btn" onclick="toggleReader(false)">[ CLS_SESSION ]</div>
        <div class="article-content" id="readerContent">
            <h1 id="articleTitle">Knowledge Node</h1>
            <div id="articleText">Select a node to begin streaming research data...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const stage = document.getElementById('graph-stage');
        const nodesLayer = document.getElementById('nodes-layer');
        const edgeLayer = document.getElementById('edge-layer');
        const reader = document.getElementById('reader');
        const gridBg = document.getElementById('grid-bg');

        let cameraX = 0, cameraY = 0, scale = 1;
        let isPanning = false;

        // --- Interaction: Infinite Panning & Zoom ---
        document.addEventListener('mousedown', (e) => {
            if (e.target.closest('.node-orb') || e.target.closest('.side-reader')) return;
            isPanning = true;
            document.getElementById('atlas-canvas').style.cursor = 'grabbing';
        });

        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale *= delta;
            scale = Math.min(Math.max(0.1, scale), 3); // Constraint zoom
            updateStage();
        }, { passive: false });

        document.addEventListener('mouseup', () => {
            isPanning = false;
            document.getElementById('atlas-canvas').style.cursor = 'grab';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            cameraX += e.movementX;
            cameraY += e.movementY;
            updateStage();
        });

        function updateStage() {
            stage.style.transform = `translate(${cameraX}px, ${cameraY}px) scale(${scale})`;
            // Move grid background with parallax effect
            gridBg.style.backgroundPosition = `${cameraX * 0.2}px ${cameraY * 0.2}px`;
        }

        function toggleReader(show) {
            reader.classList.toggle('active', show);
        }

        // State to track expanded folders
        const expandedFolders = new Set();

        function createOrb(node, x, y, path = "", parentPos = null, depth = 0) {
            const orb = document.createElement('div');
            orb.className = 'node-orb';
            orb.style.left = `${x}px`;
            orb.style.top = `${y}px`;
            orb.style.opacity = '0';
            orb.style.transform = 'scale(0.5)';

            // Staggered entry
            setTimeout(() => {
                orb.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                orb.style.opacity = '1';
                orb.style.transform = 'scale(1)';
            }, depth * 50);

            const isFolder = node.type === 'directory';
            const nodePath = path + (path ? '/' : '') + node.name;

            orb.innerHTML = `
                <div class="orb-core ${isFolder ? 'folder-core' : ''}"></div>
                <div class="node-label">${node.name.replace('.md', '').replaceAll('-', ' ')}</div>
            `;

            orb.onclick = (e) => {
                e.stopPropagation();

                // Camera centering logic
                const zoomFactor = isFolder ? 0.8 : 1.2;
                cameraX = -x + (window.innerWidth / 2) - 70;
                cameraY = -y + (window.innerHeight / 2) - 70;
                scale = zoomFactor;
                updateStage();

                if (isFolder) {
                    logSystem(`EXPANDING_CLUSTER: ${node.name.toUpperCase()}`);
                    if (expandedFolders.has(nodePath)) {
                        expandedFolders.delete(nodePath);
                    } else {
                        expandedFolders.add(nodePath);
                        if (node.children) {
                            renderBranch(node.children, x, y, nodePath, depth + 1);
                        }
                    }
                } else {
                    logSystem(`FETCHING_NODE: ${node.name.toUpperCase()}`);
                    fetchMarkdown(nodePath, node.name);
                }
            };

            nodesLayer.appendChild(orb);

            if (parentPos) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", parentPos.x + 70);
                line.setAttribute("y1", parentPos.y + 70);
                line.setAttribute("x2", x + 70);
                line.setAttribute("y2", y + 70);
                line.setAttribute("stroke", isFolder ? "rgba(112, 0, 255, 0.2)" : "rgba(0, 243, 255, 0.1)");
                line.setAttribute("stroke-width", "1.5");
                line.style.opacity = '0';
                setTimeout(() => { line.style.opacity = '1'; line.style.transition = 'opacity 1s'; }, depth * 50);
                edgeLayer.appendChild(line);
            }

            return { x, y };
        }

        function renderBranch(children, startX, startY, parentPath, depth) {
            const childCount = children.length;
            const radius = 800 * Math.pow(0.7, depth);
            const angleStep = (Math.PI * 2) / childCount;

            children.forEach((child, i) => {
                const angle = i * angleStep;
                const tx = startX + Math.cos(angle) * radius;
                const ty = startY + Math.sin(angle) * radius;
                createOrb(child, tx, ty, parentPath, { x: startX, y: startY }, depth);
            });
        }

        async function fetchMarkdown(fullPath, displayName) {
            document.getElementById('articleTitle').innerText = displayName.replace('.md', '').replaceAll('-', ' ');
            document.getElementById('articleText').innerHTML = `<p class="strm-text">FETCHING_RESEARCH_DATA: [${fullPath}] ...</p>`;
            toggleReader(true);

            try {
                const response = await fetch(`data/${fullPath}`);
                if (!response.ok) throw new Error("NODE_UNREACHABLE");
                const text = await response.text();

                // Custom math rendering logic: Replace $$ with KaTeX delimiters if needed
                // But marked.js + katex-display-md should handle it if loaded.
                document.getElementById('articleText').innerHTML = marked.parse(text);

                // Post-processing math if needed
                if (window.renderMathInElement) {
                    window.renderMathInElement(document.getElementById('articleText'), {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '$', right: '$', display: false }
                        ]
                    });
                }

                document.getElementById('articleText').style.animation = 'pulse-in 0.8s ease-out';
            } catch (err) {
                document.getElementById('articleText').innerHTML = `<p style="color:red">[ERR_LINK_FRAG]: Node data could not be retrieved.</p>`;
            }
        }

        // Initialize Search Search (Find Node)
        const searchInput = document.querySelector('.search-field');
        searchInput.addEventListener('input', (e) => {
            const query = searchInput.value.toLowerCase();
            const nodes = document.querySelectorAll('.node-orb');

            nodes.forEach(nodeEl => {
                const label = nodeEl.querySelector('.node-label').innerText.toLowerCase();
                if (query && !label.includes(query)) {
                    nodeEl.style.opacity = '0.1';
                } else {
                    nodeEl.style.opacity = '1';
                }
            });
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.toLowerCase();
                const nodes = document.querySelectorAll('.node-orb');
                let found = false;

                nodes.forEach(nodeEl => {
                    const label = nodeEl.querySelector('.node-label').innerText.toLowerCase();
                    if (label.includes(query) && !found) {
                        nodeEl.click(); // Trigger click (centers and loads)
                        found = true;
                    }
                });
            }
        });

        function logSystem(msg) {
            const log = document.getElementById('system-log');
            log.innerHTML = `[ ${msg} ]`;
            log.style.opacity = '1';
            setTimeout(() => { log.style.opacity = '0.4'; }, 2000);
        }

        // --- Bootstrap ---
        fetch('structure.json')
            .then(res => res.json())
            .then(data => {
                logSystem('INITIALIZING_CONSTELATION_DRIVE');
                nodesLayer.innerHTML = '';
                edgeLayer.innerHTML = '';
                // Render initial level
                if (data.children) {
                    renderBranch(data.children, 5000, 5000, "", 0);
                }
            });
    </script>
</body>

</html>
